<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UHC Spieltagsrechner 🏑</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">🏑</div>
        <div>
          <h1>UHC Hamburg · Spieltagsrechner</h1>
          <p class="subtitle">Feldhockey · Turnier-Modus</p>
        </div>
        <button id="btnDark" class="btn-icon" title="Dark Mode umschalten" type="button">🌙</button>
      </div>

      <div class="card">
        <h2>🏑 Teams</h2>
        <div class="team-controls">
          <span>Teams:</span>
          <button id="btnTeamDec" type="button">−</button>
          <span id="teamCountVal" class="team-count">4</span>
          <button id="btnTeamInc" type="button">+</button>
        </div>
        <div class="team-inputs" id="teamInputs"></div>
      </div>

      <div class="card">
        <h2>🏑 Spiele · Jeder gegen Jeden</h2>
        <div class="matches" id="matches"></div>
        <div class="actions">
          <button id="btnCalc">📋 Tabelle kopieren</button>
          <button class="secondary" id="btnReset">🔄 Ergebnisse löschen</button>
        </div>
        <div id="errorContainer" class="error-msg"></div>
      </div>

      <div class="card hidden" id="tableCard">
        <h2>🏆 Tabelle</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Team</th>
                <th>Sp</th>
                <th>+</th>
                <th>-</th>
                <th>Diff</th>
                <th>Pkt</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <p class="info-text">🏑 Platz 1 = 🥇 · Sieg = 3 Pkt · Unentschieden = 1 Pkt</p>
      </div>

      <div class="card">
        <h2>📋 Spielverlauf</h2>
        <div id="historyList" class="history-list"></div>
        <button class="secondary" id="btnResetHistory">🗑️ History löschen</button>
      </div>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
