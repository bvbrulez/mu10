<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UHC Spieltagsrechner 🏑</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">🏑</div>
        <div>
          <h1>UHC Hamburg · Spieltagsrechner</h1>
          <p class="subtitle">Feldhockey · 4er-Turnier</p>
        </div>
      </div>

      <div class="card">
        <h2>🏑 Teams</h2>
        <div class="team-inputs">
          <input type="text" id="team1" placeholder="Team 1" value="Team A" />
          <input type="text" id="team2" placeholder="Team 2" value="Team B" />
          <input type="text" id="team3" placeholder="Team 3" value="Team C" />
          <input type="text" id="team4" placeholder="Team 4" value="Team D" />
        </div>
      </div>

      <div class="card">
        <h2>🏑 Spiele · Jeder gegen Jeden</h2>
        <div class="matches" id="matches"></div>
        <div class="actions" style="margin-top: 1rem">
          <button id="btnCalc">📊 Tabelle berechnen</button>
          <button class="secondary" id="btnReset">
            🔄 Zurücksetzen
          </button>
        </div>
      </div>

      <div class="card hidden" id="tableCard">
        <h2>🏆 Tabelle</h2>
        <div style="overflow-x: auto">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Team</th>
                <th>Sp</th>
                <th>+</th>
                <th>-</th>
                <th>Diff</th>
                <th>Pkt</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <p class="info-text">🏑 Platz 1 = 🥇 · Sieg = 3 Pkt · Unentschieden = 1 Pkt</p>
      </div>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
