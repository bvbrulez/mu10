<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Spiele und Tabelle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 20px;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .game-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .form-group label {
            min-width: 80px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .games-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .game-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .game-item:hover {
            background: #efefef;
            transform: translateX(5px);
        }

        .game-info {
            flex: 1;
        }

        .game-teams {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .game-score {
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
        }

        .delete-btn {
            background: #e74c3c;
            padding: 8px 12px;
            font-size: 0.9em;
            margin: 0;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .table-wrapper {
            grid-column: 1 / -1;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        thead {
            background: #667eea;
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
        }

        tbody tr {
            transition: all 0.3s;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        tbody tr:nth-child(1) {
            background: #ffd700;
        }

        tbody tr:nth-child(2) {
            background: #c0c0c0;
        }

        tbody tr:nth-child(3) {
            background: #cd7f32;
        }

        .rank {
            font-weight: 600;
            color: #333;
            min-width: 30px;
        }

        .team-name {
            font-weight: 600;
            color: #333;
        }

        .stat {
            text-align: center;
            font-weight: 500;
        }

        .points {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 8px;
            }
        }

        .no-games {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }

        .reset-btn {
            background: #e74c3c;
            margin-top: 10px;
            width: 100%;
        }

        .reset-btn:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Team Spiele & Tabelle</h1>

        <div class="content">
            <!-- Spiele hinzufügen -->
            <div class="card">
                <h2>Spiel hinzufügen</h2>
                <form class="game-form" id="gameForm">
                    <div class="form-group">
                        <label for="team1">Team 1:</label>
                        <input type="text" id="team1" placeholder="z.B. FC Bayern" required>
                    </div>

                    <div class="form-row">
                        <input type="number" id="score1" min="0" placeholder="Tore" required style="text-align: center;">
                        <span style="text-align: center; font-weight: bold;">:</span>
                        <input type="number" id="score2" min="0" placeholder="Tore" required style="text-align: center;">
                    </div>

                    <div class="form-group">
                        <label for="team2">Team 2:</label>
                        <input type="text" id="team2" placeholder="z.B. BVB" required>
                    </div>

                    <button type="submit">Spiel hinzufügen</button>
                </form>
            </div>

            <!-- Spiele Liste -->
            <div class="card">
                <h2>Bisherige Spiele</h2>
                <div class="games-list" id="gamesList">
                    <div class="no-games">Noch keine Spiele hinzugefügt</div>
                </div>
                <button class="reset-btn" onclick="resetAll()">Alle löschen</button>
            </div>

            <!-- Tabelle -->
            <div class="card table-wrapper">
                <h2>Tabelle</h2>
                <table id="standingsTable">
                    <thead>
                        <tr>
                            <th>Platz</th>
                            <th>Team</th>
                            <th>Spiele</th>
                            <th>Siege</th>
                            <th>Unentschieden</th>
                            <th>Niederlagen</th>
                            <th>Tore</th>
                            <th>Differenz</th>
                            <th>Punkte</th>
                        </tr>
                    </thead>
                    <tbody id="standingsBody">
                        <tr>
                            <td colspan="9" class="no-games">Keine Daten vorhanden</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Spiele aus localStorage laden
        let games = JSON.parse(localStorage.getItem('games')) || [];

        // Event Listener für das Formular
        document.getElementById('gameForm').addEventListener('submit', addGame);

        function addGame(e) {
            e.preventDefault();

            const team1 = document.getElementById('team1').value.trim();
            const score1 = parseInt(document.getElementById('score1').value);
            const score2 = parseInt(document.getElementById('score2').value);
            const team2 = document.getElementById('team2').value.trim();

            if (!team1 || !team2 || isNaN(score1) || isNaN(score2)) {
                alert('Bitte alle Felder ausfüllen!');
                return;
            }

            games.push({
                id: Date.now(),
                team1,
                score1,
                team2,
                score2
            });

            saveGames();
            updateUI();
            document.getElementById('gameForm').reset();
            document.getElementById('team1').focus();
        }

        function deleteGame(id) {
            games = games.filter(game => game.id !== id);
            saveGames();
            updateUI();
        }

        function resetAll() {
            if (confirm('Möchtest du wirklich alle Spiele löschen?')) {
                games = [];
                saveGames();
                updateUI();
            }
        }

        function saveGames() {
            localStorage.setItem('games', JSON.stringify(games));
        }

        function calculateStandings() {
            const standings = {};

            games.forEach(game => {
                // Team 1
                if (!standings[game.team1]) {
                    standings[game.team1] = {
                        team: game.team1,
                        played: 0,
                        wins: 0,
                        draws: 0,
                        losses: 0,
                        goalsFor: 0,
                        goalsAgainst: 0,
                        points: 0
                    };
                }

                // Team 2
                if (!standings[game.team2]) {
                    standings[game.team2] = {
                        team: game.team2,
                        played: 0,
                        wins: 0,
                        draws: 0,
                        losses: 0,
                        goalsFor: 0,
                        goalsAgainst: 0,
                        points: 0
                    };
                }

                // Update Team 1
                standings[game.team1].played++;
                standings[game.team1].goalsFor += game.score1;
                standings[game.team1].goalsAgainst += game.score2;

                // Update Team 2
                standings[game.team2].played++;
                standings[game.team2].goalsFor += game.score2;
                standings[game.team2].goalsAgainst += game.score1;

                // Determine winner
                if (game.score1 > game.score2) {
                    standings[game.team1].wins++;
                    standings[game.team1].points += 3;
                    standings[game.team2].losses++;
                } else if (game.score1 < game.score2) {
                    standings[game.team2].wins++;
                    standings[game.team2].points += 3;
                    standings[game.team1].losses++;
                } else {
                    standings[game.team1].draws++;
                    standings[game.team1].points += 1;
                    standings[game.team2].draws++;
                    standings[game.team2].points += 1;
                }
            });

            // Convert to array and sort
            return Object.values(standings).sort((a, b) => {
                if (b.points !== a.points) return b.points - a.points;
                if ((b.goalsFor - b.goalsAgainst) !== (a.goalsFor - a.goalsAgainst)) {
                    return (b.goalsFor - b.goalsAgainst) - (a.goalsFor - a.goalsAgainst);
                }
                return b.goalsFor - a.goalsFor;
            });
        }

        function updateUI() {
            updateGamesList();
            updateStandingsTable();
        }

        function updateGamesList() {
            const gamesList = document.getElementById('gamesList');

            if (games.length === 0) {
                gamesList.innerHTML = '<div class="no-games">Noch keine Spiele hinzugefügt</div>';
                return;
            }

            gamesList.innerHTML = games.map(game => `
                <div class="game-item">
                    <div class="game-info">
                        <div class="game-teams">${game.team1} vs ${game.team2}</div>
                        <div class="game-score">${game.score1} : ${game.score2}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteGame(${game.id})">Löschen</button>
                </div>
            `).join('');
        }

        function updateStandingsTable() {
            const standings = calculateStandings();
            const tbody = document.getElementById('standingsBody');

            if (standings.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="no-games">Keine Daten vorhanden</td></tr>';
                return;
            }

            tbody.innerHTML = standings.map((team, index) => `
                <tr>
                    <td class="rank">${index + 1}.</td>
                    <td class="team-name">${team.team}</td>
                    <td class="stat">${team.played}</td>
                    <td class="stat">${team.wins}</td>
                    <td class="stat">${team.draws}</td>
                    <td class="stat">${team.losses}</td>
                    <td class="stat">${team.goalsFor}:${team.goalsAgainst}</td>
                    <td class="stat">${team.goalsFor - team.goalsAgainst > 0 ? '+' : ''}${team.goalsFor - team.goalsAgainst}</td>
                    <td><span class="points">${team.points}</span></td>
                </tr>
            `).join('');
        }

        // Initial UI update
        updateUI();
    </script>
</body>
</html>
