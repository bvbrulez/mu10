<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UHC-Hamburg mu10 Spieltagsrechner</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>🏑 UHC Hamburg mu10 Spieltagsrechner 🏑</h1>

        <div class="content">
            <!-- Spiele hinzufügen -->
            <div class="card">
                <h2>Spiel hinzufügen</h2>
                <form class="game-form" id="gameForm">
                    <div class="form-group">
                        <label for="team1">Team 1:</label>
                        <input type="text" id="team1" placeholder="z.B. UHC Hamburg" required>
                    </div>

                    <div class="form-row">
                        <input type="number" id="score1" min="0" placeholder="Tore" required style="text-align: center;">
                        <span style="text-align: center; font-weight: bold;">:</span>
                        <input type="number" id="score2" min="0" placeholder="Tore" required style="text-align: center;">
                    </div>

                    <div class="form-group">
                        <label for="team2">Team 2:</label>
                        <input type="text" id="team2" placeholder="z.B. HTHC" required>
                    </div>

                    <button type="submit">Spiel hinzufügen</button>
                </form>
            </div>

            <!-- Spiele Liste -->
            <div class="card">
                <h2>Bisherige Spiele</h2>
                <div class="games-list" id="gamesList">
                    <div class="no-games">Noch keine Spiele hinzugefügt</div>
                </div>
                <button class="reset-btn" onclick="gameManager.resetAll()">Alle löschen</button>
            </div>

            <!-- Tabelle -->
            <div class="card table-wrapper">
                <h2>Tabelle</h2>
                <table id="standingsTable">
                    <thead>
                        <tr>
                            <th>Platz</th>
                            <th>Team</th>
                            <th>Spiele</th>
                            <th>Siege</th>
                            <th>Unentschieden</th>
                            <th>Niederlagen</th>
                            <th>Tore</th>
                            <th>Differenz</th>
                            <th>Punkte</th>
                        </tr>
                    </thead>
                    <tbody id="standingsBody">
                        <tr>
                            <td colspan="9" class="no-games">Keine Daten vorhanden</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/gameManager.js"></script>
    <script src="js/standingsCalculator.js"></script>
    <script src="js/uiRenderer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
